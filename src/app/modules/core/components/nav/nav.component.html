<nav class="nav">
  <button class="openCloseButton" (click)="openCloseNav()"></button>
  <a routerLink="/" (click)="openCloseNav()">Forside</a>
  <div class="otherNavComponents">
    @for (route of routes; track route) {
      @if (route.showInNavList) {
        <a [routerLink]="route.path" (click)="openCloseNav()">{{ route.displayName }}</a>
      }
    }
  </div>
</nav>
